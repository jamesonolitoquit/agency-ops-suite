name: CI - Scanners

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  scanners:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run secret scan
        run: npm run test:secret-scan

      - name: Run ESLint (workspace)
        run: |
          npm run --workspace apps/admin-dashboard lint

      - name: Run hygiene files check
        run: |
          npm run --workspace apps/admin-dashboard hygiene:files

      - name: Run unit tests with coverage
        run: |
          # run smoke/unit tests for admin-dashboard
          npm run --workspace apps/admin-dashboard test:smoke

      - name: Run role access tests
        run: |
          npm run --workspace apps/admin-dashboard test:role-access

      - name: Run client portal route smoke test
        run: |
          set -euo pipefail
          npm run --workspace apps/admin-dashboard dev -- --hostname 127.0.0.1 --port 3000 > /tmp/admin-dashboard-dev.log 2>&1 &
          DEV_PID=$!
          trap 'kill $DEV_PID' EXIT

          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:3000/login > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -sSf http://127.0.0.1:3000/login > /dev/null
          npm run --workspace apps/admin-dashboard test:client-portal-routes

      - name: Upload scanner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanners-output
          path: |
            apps/admin-dashboard/.*/** || apps/admin-dashboard/*.log || ./*.log || **/leaks.json || test-results/**
